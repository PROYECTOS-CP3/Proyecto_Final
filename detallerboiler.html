<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Detalle Producto
    </title>

    <link rel="stylesheet" href="/css/style.css">

    <style>

        /* =========================
           RESET
        ========================= */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f7fb;
            color:#111827;
        }

        /* =========================
           CONTAINER
        ========================= */

        .container{
            max-width:1300px;
            margin:60px auto;
            padding:0 20px;
        }

        .breadcrumb{
            margin-bottom:30px;
            color:#6b7280;
        }

        /* =========================
           PRODUCTO
        ========================= */

        .product-box{
            background:white;
            border-radius:30px;
            overflow:hidden;
            display:grid;
            grid-template-columns:1fr 1fr;
            min-height:700px;
        }

        .left-side{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:60px;
            background:#eef2ff;
        }

        .left-side img{
            width:100%;
            max-width:420px;
            height:500px;
            object-fit:contain;
        }

        .right-side{
            padding:60px;
        }

        .category{
            color:#6366f1;
            margin-bottom:20px;
        }

        .title{
            font-size:48px;
            margin-bottom:25px;
        }

        .rating{
            margin-bottom:25px;
        }

        .description{
            margin-bottom:30px;
            line-height:1.8;
        }

        .price{
            font-size:58px;
            font-weight:bold;
            margin-bottom:30px;
        }

        .actions{
            display:flex;
            gap:15px;
        }

        button{
            border:none;
            padding:18px;
            border-radius:18px;
            cursor:pointer;
        }

        .buy-btn{
            flex:1;
        }

        .fav-btn{
            width:70px;
        }

        /* =========================
           INFO
        ========================= */

        .info-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
            margin-bottom:40px;
        }

        .info-card{
            padding:20px;
            border-radius:20px;
            background:#f9fafb;
        }

        /* =========================
           RELACIONADOS
        ========================= */

        .related{
            margin-top:60px;
        }

        .related h2{
            margin-bottom:25px;
        }

        .related-grid{
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .related-card{
            background:white;
            border-radius:24px;
            padding:25px;
            text-align:center;
        }

        .related-card img{
            width:100%;
            height:180px;
            object-fit:contain;
        }

        /* =========================
           RESPONSIVE
        ========================= */

        @media(max-width:1000px){

            .product-box{
                grid-template-columns:1fr;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="breadcrumb">

            Home / Categoría / Producto
            <span id="pageUser" style="float:right;font-weight:600;color:#374151"></span>

        </div>

        <section class="product-box">

            <div class="left-side">

                <img
                    id="productImage"
                >

            </div>

            <div class="right-side">

                <p
                    class="category"
                    id="productCategory"
                >
                </p>

                <h1
                    class="title"
                    id="productTitle"
                >
                </h1>

                <div class="rating">

                    ⭐ 4.8

                    <span
                        id="productReviews"
                    >
                    </span>

                </div>

                <p
                    class="description"
                    id="productDescription"
                >
                </p>

                <div class="info-grid">

                    <div class="info-card">
                        Marca
                    </div>

                    <div class="info-card">
                        Stock
                    </div>

                    <div class="info-card">
                        Envío
                    </div>

                    <div class="info-card">
                        SKU
                    </div>

                </div>

                <div
                    class="price"
                    id="productPrice"
                >
                </div>

                <div class="actions">

                    <button
                        class="buy-btn"
                        id="addToCartBtn"
                    >
                        Añadir al carrito
                    </button>

                    <button
                        class="fav-btn"
                        id="favoriteBtn"
                    >
                        ❤️
                    </button>

                </div>

            </div>

        </section>

        <section class="related">

            <h2>
                Productos relacionados
            </h2>

            <div
                class="related-grid"
                id="relatedGrid"
            >
            </div>

        </section>

    </div>

    <script>

        let currentProduct = null;

        async function getProduct(){
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || localStorage.getItem('lastProductId') || '1';
            try{
                const res = await fetch('https://fakestoreapi.com/products/'+id);
                if (!res.ok) throw new Error('HTTP '+res.status);
                const p = await res.json();
                currentProduct = p;
                localStorage.setItem('lastProductId', p.id);
                renderProduct(p);
                getRelatedProducts(p.category);
            }catch(err){
                console.error('Error al obtener producto', err);
            }
        }

        function renderProduct(p){
            document.getElementById('productImage').src = p.image;
            document.getElementById('productCategory').textContent = p.category;
            document.getElementById('productTitle').textContent = p.title;
            document.getElementById('productDescription').textContent = p.description;
            document.getElementById('productPrice').textContent = p.price + ' €';
            document.getElementById('productReviews').textContent = p.rating ? `(Rating: ${p.rating.rate} ⭐)` : '';
            // estado del boton favorito
            try{
                const favBtn = document.getElementById('favoriteBtn');
                const fav = JSON.parse(localStorage.getItem('favorites')) || [];
                if (fav.includes(p.id)){
                    favBtn.textContent = '❤️';
                    favBtn.classList.add('favorited');
                } else {
                    favBtn.textContent = '🤍';
                    favBtn.classList.remove('favorited');
                }
            }catch(e){ /* ignore */ }
        }

        async function getRelatedProducts(category){
            try{
                const res = await fetch('https://fakestoreapi.com/products/category/'+encodeURIComponent(category));
                const arr = await res.json();
                renderRelatedProducts(arr.filter(x=>x.id!=currentProduct.id));
            }catch(e){ console.error('related',e); }
        }

        function renderRelatedProducts(arr){
            const grid = document.getElementById('relatedGrid');
            grid.innerHTML = '';
            arr.forEach(p=>{
                const card = document.createElement('div');
                card.className = 'related-card';
                card.innerHTML = `\n                    <img src="${p.image}" alt="${p.title}">\n                    <h3>${p.title}</h3>\n                    <p>${p.price} €</p>\n                    <button class="details-small" data-id="${p.id}">Ver</button>\n                `;
                grid.appendChild(card);
            });
            // delegación para botones ver
            grid.addEventListener('click', (e)=>{
                const t = e.target;
                if (t && t.matches && t.matches('.details-small')){
                    const id = t.getAttribute('data-id');
                    if (id) window.location.href = 'detallerboiler.html?id='+id;
                }
            });
        }

        function addToCart(){
            if (!currentProduct) return;
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(i=>i.id===currentProduct.id);
            if (existing) existing.quantity = (existing.quantity||1)+1;
            else cart.push({...currentProduct, quantity:1});
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(currentProduct.title + ' añadido al carrito');
        }

        function buyNow(){
            addToCart();
            window.location.href = 'boiler_carrito.html';
        }

        function addToFavorites(){
            if (!currentProduct) return;
            let fav = JSON.parse(localStorage.getItem('favorites')) || [];
            const favBtn = document.getElementById('favoriteBtn');
            if (!fav.includes(currentProduct.id)){
                fav.push(currentProduct.id);
                favBtn.textContent = '❤️';
                favBtn.classList.add('favorited');
            } else {
                fav = fav.filter(id=>id!==currentProduct.id);
                favBtn.textContent = '🤍';
                favBtn.classList.remove('favorited');
            }
            localStorage.setItem('favorites', JSON.stringify(fav));
        }

        function initEvents(){
            const addBtn = document.getElementById('addToCartBtn');
            const favBtn = document.getElementById('favoriteBtn');
            // crear boton comprar ahora
            const buyNowBtn = document.createElement('button');
            buyNowBtn.className = 'buy-btn';
            buyNowBtn.id = 'buyNowBtn';
            buyNowBtn.textContent = 'Comprar ahora';
            addBtn.parentNode.insertBefore(buyNowBtn, favBtn);

            addBtn.addEventListener('click', addToCart);
            buyNowBtn.addEventListener('click', buyNow);
            favBtn.addEventListener('click', addToFavorites);
        }

        function init(){
            getProduct();
            initEvents();
            // mostrar usuario si existe
            try{ const u = sessionStorage.getItem('username'); const el = document.getElementById('pageUser'); if (el) el.textContent = u ? u : ''; }catch(e){}
        }

        init();

    </script>
</body>

</html>
