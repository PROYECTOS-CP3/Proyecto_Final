<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Mi Perfil
    </title>

    <link rel="stylesheet" href="../css/style.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f3f6fb;
            color:#111827;
        }

        .container{
            max-width:1400px;
            margin:50px auto;
            padding:0 20px;
        }

        .profile-layout{
            display:grid;
            grid-template-columns:320px 1fr;
            gap:30px;
        }

        /* SIDEBAR */

        .sidebar{
            background:white;
            border-radius:30px;
            padding:35px;
            height:fit-content;
            box-shadow:0 15px 40px rgba(0,0,0,.06);
        }

        .avatar{
            width:120px;
            height:120px;
            border-radius:50%;
            background:#6366f1;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            margin-bottom:25px;
            font-size:42px;
            font-weight:bold;
        }

        .username{
            text-align:center;
            font-size:28px;
            margin-bottom:10px;
        }

        .email{
            text-align:center;
            color:#6b7280;
            margin-bottom:30px;
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .menu button{
            border:none;
            padding:16px;
            border-radius:16px;
            cursor:pointer;
            background:#f9fafb;
            font-weight:bold;
        }

        /* MAIN */

        .main{
            display:flex;
            flex-direction:column;
            gap:30px;
        }

        .card{
            background:white;
            border-radius:30px;
            padding:35px;
            box-shadow:0 15px 40px rgba(0,0,0,.06);
        }

        .card h2{
            margin-bottom:25px;
            font-size:30px;
        }

        /* FORM */

        .form-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .input-group{
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .input-group label{
            font-weight:bold;
        }

        .input-group input{
            padding:16px;
            border-radius:14px;
            border:1px solid #dbe3ee;
            background:#f9fafb;
        }

        .save-btn{
            margin-top:25px;
            border:none;
            background:#6366f1;
            color:white;
            padding:18px;
            border-radius:16px;
            width:100%;
            cursor:pointer;
            font-weight:bold;
        }

        /* FAVORITOS */

        .favorites-grid{
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .favorite-card{
            background:#f9fafb;
            border-radius:24px;
            padding:20px;
            text-align:center;
        }

        .favorite-card img{
            width:100%;
            height:180px;
            object-fit:contain;
            margin-bottom:20px;
        }

        .favorite-card h3{
            margin-bottom:10px;
        }

        /* PEDIDOS */

        .orders{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .order{
            border:1px solid #e5e7eb;
            border-radius:20px;
            padding:25px;
        }

        .message{
            display:none;
            margin-top:20px;
            padding:16px;
            border-radius:14px;
            background:#dcfce7;
            color:#166534;
        }

        @media(max-width:1000px){

            .profile-layout{
                grid-template-columns:1fr;
            }

        }

        @media(max-width:700px){

            .form-grid{
                grid-template-columns:1fr;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="profile-layout">

            <aside class="sidebar">

                <div
                    class="avatar"
                    id="avatar"
                >
                </div>

                <h2
                    class="username"
                    id="sidebarUsername"
                >
                </h2>

                <p
                    class="email"
                    id="sidebarEmail"
                >
                </p>

                <div class="menu">

                    <button>
                        Mi perfil
                    </button>

                    <button>
                        Pedidos
                    </button>

                    <button>
                        Favoritos
                    </button>

                    <button
                        id="logoutBtn"
                    >
                        Cerrar sesión
                    </button>

                </div>

            </aside>

            <main class="main">

                <!-- PERFIL -->

                <section class="card">

                    <h2>
                        Editar perfil
                    </h2>

                    <form id="profileForm">

                        <div class="form-grid">

                            <div class="input-group">
                                <label>Nombre</label>
                                <input type="text" id="firstname">
                            </div>

                        

                        </div>

                        <button
                            class="save-btn"
                            type="submit"
                        >
                            Guardar cambios
                        </button>

                        <div
                            class="message"
                            id="message"
                        >
                            Usuario actualizado correctamente
                        </div>

                    </form>

                </section>

                <!-- FAVORITOS -->



                <!-- PEDIDOS -->

               

            </main>

        </div>

    </div>

    <script>

        // ==================================
        // Perfil: mostrar avatar y nombre en página aparte
        // ==================================

        let currentUser = null;

        async function loadAndRenderUser(){
            // preferir datos provistos por el login
            const displayName = sessionStorage.getItem('displayName');
            const emailFromSession = sessionStorage.getItem('email');
            const sessionUserId = sessionStorage.getItem('userId');
            const cached = localStorage.getItem('profile_cache');
            if (cached){
                try{ currentUser = JSON.parse(cached); }catch(e){ currentUser = null; }
            }
            if (!currentUser && sessionUserId){
                try{
                    const res = await fetch(`https://fakestoreapi.com/users/${sessionUserId}`);
                    if (res.ok) currentUser = await res.json();
                }catch(e){ console.warn('No se pudo cargar usuario por id',e); }
            }
            if (!currentUser && displayName){
                currentUser = { username: sessionStorage.getItem('username') || displayName, email: emailFromSession || '', name: { firstname: displayName, lastname: '' } };
            }
            if (!currentUser){
                const username = sessionStorage.getItem('username');
                currentUser = { username: username || 'Usuario', email: '', name: { firstname: username || 'Usuario', lastname: '' } };
            }
            renderUser(currentUser);
        }

        function renderUser(user){
            if (!user) return;
            const name = (user.name && (user.name.firstname || user.name.lastname)) ? `${user.name.firstname||''} ${user.name.lastname||''}`.trim() : (user.username || 'Usuario');
            const email = user.email || '';
            const avatarEl = document.getElementById('avatar');
            const sidebarUsername = document.getElementById('sidebarUsername');
            const sidebarEmail = document.getElementById('sidebarEmail');
            const firstnameInput = document.getElementById('firstname');
            try{
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6366f1&color=fff&size=256`;
                if (avatarEl) avatarEl.innerHTML = `<img src="${avatarUrl}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;">`;
            }catch(e){}
            if (sidebarUsername) sidebarUsername.textContent = name;
            if (sidebarEmail) sidebarEmail.textContent = email;
            if (firstnameInput) firstnameInput.value = user.name && user.name.firstname ? user.name.firstname : (user.username || '');
        }

        function logoutFromProfile(){
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('username');
            sessionStorage.removeItem('postLoginRedirect');
            window.location.href = 'index.html';
        }

        function showMessage(text, ok = true){
            const msg = document.getElementById('message');
            if (!msg) return;
            msg.textContent = text;
            msg.style.display = 'block';
            msg.style.background = ok ? '#dcfce7' : '#fee2e2';
            msg.style.color = ok ? '#166534' : '#991b1b';
            setTimeout(()=>{ msg.style.display='none'; msg.textContent = 'Usuario actualizado correctamente'; msg.style.background = '#dcfce7'; msg.style.color = '#166534'; }, 2500);
        }

        function saveProfile(e){
            e.preventDefault();
            const fnEl = document.getElementById('firstname');
            const fn = fnEl ? fnEl.value.trim() : '';
            if (!fn){
                showMessage('El nombre no puede estar vacío', false);
                if (fnEl) fnEl.focus();
                return;
            }
            if (!currentUser) currentUser = { name: {} };
            if (!currentUser.name) currentUser.name = {};
            currentUser.name.firstname = fn;
            try{ localStorage.setItem('profile_cache', JSON.stringify(currentUser)); }catch(e){ console.warn('No se pudo guardar profile_cache',e); }

            // Intentar sincronizar con la API si tenemos userId
            const sessionUserId = sessionStorage.getItem('userId');
            if (sessionUserId){
                (async ()=>{
                    try{
                        const payload = {
                            email: currentUser.email || sessionStorage.getItem('email') || '',
                            username: sessionStorage.getItem('username') || currentUser.username || '',
                            name: { firstname: currentUser.name.firstname || '', lastname: currentUser.name.lastname || '' }
                        };
                        const res = await fetch(`https://fakestoreapi.com/users/${sessionUserId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (res.ok){
                            const json = await res.json();
                            // actualizar cache local con lo que devuelva la API
                            try{ localStorage.setItem('profile_cache', JSON.stringify(json)); }catch(e){}
                            showMessage('Perfil sincronizado con la API', true);
                            // actualizar session displayName
                            const disp = `${json.name.firstname||''} ${json.name.lastname||''}`.trim();
                            if (disp) sessionStorage.setItem('displayName', disp);
                            renderUser(json);
                            return;
                        } else {
                            console.warn('API PUT falló', res.status);
                            showMessage('Guardado localmente (API no disponible)', false);
                        }
                    }catch(err){
                        console.warn('Error sincronizando con API', err);
                        showMessage('Guardado localmente (error de red)', false);
                    }
                })();
            } else {
                showMessage('Perfil guardado localmente', true);
                renderUser(currentUser);
            }
        }

        function initEvents(){
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', logoutFromProfile);
            const form = document.getElementById('profileForm');
            if (form) form.addEventListener('submit', saveProfile);
        }

        function init(){
            loadAndRenderUser();
            initEvents();
        }

        init();

    </script>

</body>

</html>
