<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - NovaShop</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="container">
  <header class="header">
    <div>
      <h1>NovaShop Admin</h1>
      <div id="adminUser" style="font-weight:600;color:#374151"></div>
    </div>
    <div>
      <button id="addProductBtn" class="add-btn">Nuevo producto</button>
      <a href="index.html">Volver</a>
    </div>
  </header>

  <section class="stats">
    <article class="stat-card"><h2 id="totalProducts">0</h2><p>Productos</p></article>
    <article class="stat-card"><h2 id="totalUsers">0</h2><p>Usuarios</p></article>
    <article class="stat-card"><h2 id="totalOrders">0</h2><p>Pedidos</p></article>
    <article class="stat-card"><h2 id="totalSales">0€</h2><p>Ventas</p></article>
  </section>

  <section class="filters">
    <input type="text" id="searchInput" placeholder="Buscar producto...">
  </section>

  <section class="table-container">
    <table>
      <thead>
        <tr><th>Imagen</th><th>Producto</th><th>Precio</th><th>Categoría</th><th>Acciones</th></tr>
      </thead>
      <tbody id="productsTable"></tbody>
    </table>
  </section>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Producto</h3>
    <form id="productForm">
      <div>
        <label>Título</label>
        <input id="title" type="text" required>
      </div>
      <div>
        <label>Precio</label>
        <input id="price" type="number" step="0.01" required>
      </div>
      <div>
        <label>Categoría</label>
        <input id="category" type="text">
      </div>
      <div style="margin-top:12px">
        <button class="save-btn" type="submit">Guardar</button>
        <button type="button" id="closeModalBtn">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
// proteger acceso directo: solo admin/usuarios permitidos
(function(){
  const username = sessionStorage.getItem('username');
  const allowed = ['admin','mor2314','mor_2314','mor','mors'];
  if (!username || !allowed.includes(username)){
    alert('Acceso restringido: debe iniciar sesión como admin');
    window.location.href = 'index.html';
  }
  const disp = document.getElementById('adminUser');
  if (disp) disp.textContent = username || '';
})();

let products = [];
let editingId = null;

async function getProducts(){
  try{
    const res = await fetch('https://fakestoreapi.com/products');
    if (!res.ok) throw new Error('Error loading products');
    products = await res.json();
  }catch(e){ console.warn('getProducts failed',e); products = []; }
  renderProducts(); renderStats();
}

function renderProducts(){
  const tbody = document.getElementById('productsTable'); if (!tbody) return; tbody.innerHTML = '';
  products.forEach(p=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><img src="${p.image}" class="product-image"></td>
      <td>${p.title}</td>
      <td>${(p.price||0).toFixed(2)}€</td>
      <td>${p.category}</td>
      <td class="actions">
        <button class="edit-btn" data-id="${p.id}">Editar</button>
        <button class="delete-btn" data-id="${p.id}">Borrar</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderStats(){
  const totalProductsEl = document.getElementById('totalProducts');
  const totalUsersEl = document.getElementById('totalUsers');
  const totalOrdersEl = document.getElementById('totalOrders');
  const totalSalesEl = document.getElementById('totalSales');
  if (totalProductsEl) totalProductsEl.textContent = products.length;
  fetch('https://fakestoreapi.com/users').then(r=>r.json()).then(u=>{ if (totalUsersEl) totalUsersEl.textContent = (u||[]).length; }).catch(()=>{ if (totalUsersEl) totalUsersEl.textContent = 'N/A'; });
  if (totalOrdersEl) totalOrdersEl.textContent = '0';
  const sales = products.reduce((s,p)=>s + (p.price||0)*(p.rating && p.rating.count? p.rating.count:1),0);
  if (totalSalesEl) totalSalesEl.textContent = sales.toFixed(2) + '€';
}

function openModal(){ document.getElementById('modal').style.display = 'flex'; }
function closeModal(){ document.getElementById('modal').style.display = 'none'; editingId = null; document.getElementById('productForm').reset(); }

function createProduct(payload){
  fetch('https://fakestoreapi.com/products',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
    .then(r=>r.json()).then(j=>{ products.unshift(j); renderProducts(); renderStats(); closeModal(); })
    .catch(e=>{ console.warn('create fallback',e); const id=Date.now(); products.unshift({...payload,id}); renderProducts(); renderStats(); closeModal(); });
}

function updateProduct(id,payload){
  fetch(`https://fakestoreapi.com/products/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
    .then(r=>r.json()).then(j=>{ const idx = products.findIndex(x=>x.id==id); if (idx!==-1) products[idx] = {...products[idx], ...j}; renderProducts(); renderStats(); closeModal(); })
    .catch(e=>{ console.warn('update fallback',e); const idx = products.findIndex(x=>x.id==id); if (idx!==-1) products[idx] = {...products[idx], ...payload}; renderProducts(); renderStats(); closeModal(); });
}

function deleteProduct(id){ if (!confirm('Borrar producto?')) return; fetch(`https://fakestoreapi.com/products/${id}`,{ method:'DELETE' }).then(r=>r.json()).then(j=>{ products = products.filter(p=>p.id!=id); renderProducts(); renderStats(); }).catch(e=>{ console.warn('delete fallback',e); products = products.filter(p=>p.id!=id); renderProducts(); renderStats(); }); }

function initEvents(){
  document.getElementById('addProductBtn').addEventListener('click', openModal);
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('productForm').addEventListener('submit', (ev)=>{
    ev.preventDefault();
    const title = document.getElementById('title').value.trim();
    const price = Number(document.getElementById('price').value) || 0;
    const category = document.getElementById('category').value.trim();
    const payload = { title, price, category, description: title, image: 'https://via.placeholder.com/150' };
    if (editingId) updateProduct(editingId,payload); else createProduct(payload);
  });

  document.getElementById('productsTable').addEventListener('click',(ev)=>{
    const t = ev.target;
    if (t.matches('.edit-btn')){
      const id = t.getAttribute('data-id');
      const p = products.find(x=>x.id==id);
      if (!p) return;
      editingId = id;
      document.getElementById('title').value = p.title || '';
      document.getElementById('price').value = p.price || '';
      document.getElementById('category').value = p.category || '';
      openModal();
    }
    if (t.matches('.delete-btn')){ deleteProduct(t.getAttribute('data-id')); }
  });

  const search = document.getElementById('searchInput'); if (search) search.addEventListener('input', ()=>{
    const q = search.value.trim().toLowerCase(); if (!q){ renderProducts(); return; }
    const filtered = products.filter(p=> (p.title||'').toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q));
    const tbody = document.getElementById('productsTable'); if (!tbody) return; tbody.innerHTML = '';
    filtered.forEach(p=>{ const tr = document.createElement('tr'); tr.innerHTML = `
      <td><img src="${p.image}" class="product-image"></td>
      <td>${p.title}</td>
      <td>${(p.price||0).toFixed(2)}€</td>
      <td>${p.category}</td>
      <td class="actions">
        <button class="edit-btn" data-id="${p.id}">Editar</button>
        <button class="delete-btn" data-id="${p.id}">Borrar</button>
      </td>
    `; tbody.appendChild(tr); });
  });
}

function init(){ getProducts(); initEvents(); }
init();
</script>
</body>
</html>
